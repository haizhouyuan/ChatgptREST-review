# OpenMind Advisor API — nginx 反向代理配置
# 安装：sudo cp /vol1/1000/projects/ChatgptREST/ops/nginx_openmind.conf /etc/nginx/sites-available/openmind
#        sudo ln -s /etc/nginx/sites-available/openmind /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

upstream openmind_advisor {
    server 127.0.0.1:18711;
    keepalive 8;
}

server {
    listen 80;
    server_name yogas2 yogas2.tail594315.ts.net;
    # Production baseline assumes OPENMIND_AUTH_MODE=strict and OPENMIND_API_KEY
    # is injected into the ChatgptREST/OpenMind API service.
    # Public ingress should require X-Api-Key on /v2/advisor/* except /health.

    # Redirect to HTTPS on Tailscale (optional—uncomment if Tailscale Serve is on 443)
    # return 301 https://$host$request_uri;

    location /v2/advisor/ {
        proxy_pass http://openmind_advisor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # LLM calls can be slow
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    # Health check bypass (no auth needed)
    location = /v2/advisor/health {
        proxy_pass http://openmind_advisor;
        proxy_set_header Host $host;
    }
}
