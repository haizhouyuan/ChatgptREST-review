      - "incident evidence exists but only after job failure"
    mitigations:
      - "maint_daemon periodic ui_canary (chatgpt/gemini/qwen self_check)"
      - "consecutive-failure threshold opens category=ui_canary incident"
      - "failure-triggered capture_ui with cooldown; no prompt send"
      - "orch/guardian consume ui_canary report for proactive attention"
    references:
