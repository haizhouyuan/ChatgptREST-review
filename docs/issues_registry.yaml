# ChatgptREST Issues Registry (machine-readable)
#
# Purpose
# - Curate recurring incidents / known failure modes in one high-signal place.
# - Provide context for `ops/maint_daemon.py` incident packs and Codex SRE analysis.
#
# Integration
# - maint_daemon snapshots this file into each incident pack:
#   `artifacts/monitor/maint_daemon/incidents/<incident_id>/snapshots/issues_registry.yaml`
# - The snapshot content is included in the incident's Codex input fingerprint, so any
#   change here can retrigger Codex SRE analysis for open incidents (subject to rate limits).
#
# Notes
# - Keep this file small and actionable; link to deeper writeups instead of pasting long logs.
# - Prefer stable `id` values; do not renumber IDs (append new ones).
version: 1

source_docs:
  - docs/handoff_chatgptrest_history.md
  - docs/runbook.md
  - docs/maint_daemon.md

issues:
  - id: ISSUE-0001
    title: "Pro thinking skipped / instant answer"
    status: "mitigated"
    signals:
      - "worker:thought_guard_abnormal"
      - "driver:thinking_observation.skipping=true"
    mitigations:
      - "thought guard + regenerate guard"
      - "conversation_export reconcile as fallback source of truth"
    references:
      - "docs/runbook.md (thought guard section)"
      - "docs/handoff_chatgptrest_history.md (thought guard entries)"

  - id: ISSUE-0002
    title: "Deep Research ack-only / too-short completion"
    status: "mitigated"
    signals:
      - "worker:completion_guard_downgraded"
      - "answer length < min_chars for deep_research jobs"
    mitigations:
      - "completion guard downgrades to in_progress and keeps waiting"
      - "export-based completion verification"
    references:
      - "docs/handoff_chatgptrest_history.md (deep research guard entries)"

  - id: ISSUE-0003
    title: "Attachment upload path/idempotency mismatch"
    status: "mitigated"
    signals:
      - "HTTP 409 idempotency conflict with different file path spellings"
    mitigations:
      - "require absolute paths for input.file_paths; normalize upload hashing"
    references:
      - "docs/handoff_chatgptrest_history.md (attachments + idempotency entries)"

  - id: ISSUE-0004
    title: "Deep Research widget failure ('Research failed')"
    status: "mitigated"
    signals:
      - "UI: message contains 'Research failed'"
    mitigations:
      - "detect widget failure and treat as retryable / needs followup"
    references:
      - "tests/test_deep_research_widget_failure.py"
      - "chatgpt_web_mcp/_tools_impl.py (deep research failure regex)"

  - id: ISSUE-0005
    title: "Playwright TargetClosed/Target crashed during send/upload"
    status: "observed"
    signals:
      - "last_error_type: InfraError"
      - "last_error contains 'Target page, context or browser has been closed'"
      - "last_error contains 'Target crashed'"
    mitigations:
      - "infra healer can restart Chrome/driver (guarded)"
      - "retry with cooldown backoff"
    references:
      - "docs/handoff_chatgptrest_history.md (infra healer entries)"
      - "ops/maint_daemon.py (infra healer + incident packs)"

  - id: ISSUE-0006
    title: "connect_over_cdp returned null browser (contexts AttributeError)"
    status: "mitigated"
    signals:
      - "driver error contains 'connect_over_cdp returned null browser'"
      - "driver error contains \"object has no attribute 'contexts'\""
    mitigations:
      - "treat null browser as CDP connect failure; retry after Chrome restart"
      - "fallback to storage_state when explicitly enabled"
    references:
      - "chatgpt_web_mcp/_tools_impl.py (_open_*_page CDP open)"
      - "docs/runbook.md (driver/chrome restart guidance)"

  - id: ISSUE-0007
    title: "maint_daemon restart_driver spawned orphan driver (singleton lock held)"
    status: "mitigated"
    signals:
      - "systemd: chatgptrest-driver.service restart loop"
      - "driver stderr contains 'singleton lock held'"
      - "maint_daemon has child process: chatgptrest_driver_server.py"
    mitigations:
      - "prefer systemd restart for driver; stop unit before script fallback"
      - "drain-guard + rate limit for infra healer actions"
      - "when systemd unit is loaded, disable script fallback for restart_driver (avoid orphan singleton-lock conflicts)"
      - "pin MCP_SERVER_LOCK_FILE to state/driver path to avoid mixed lock locations"
    references:
      - "ops/maint_daemon.py (_start_driver_if_down)"
      - "chatgpt_web_mcp/locks.py (singleton lock)"

  - id: ISSUE-0008
    title: "Gemini Web app unreachable (ERR_CONNECTION_CLOSED)"
    status: "observed"
    signals:
      - "worker/driver: Page.goto https://gemini.google.com/app -> net::ERR_CONNECTION_CLOSED"
      - "send-phase retry loop (cooldown) with conversation_url=null"
    mitigations:
      - "Add Gemini reachability probes (with/without proxy) into incident snapshots"
      - "Time-boxed pause of gemini_web send retries during routing diagnosis"
      - "Verify proxy routing/node for Google domains; then retry with one guarded navigation"
    references:
      - "docs/runbook.md (Gemini Web section; proxy/region troubleshooting)"
      - "ops/maint_daemon.py (incident packs + proxy snapshots)"

  - id: ISSUE-0009
    title: "Gemini Pro mode selector drift (selector/menu role changed)"
    status: "mitigated"
    signals:
      - "last_error_type: GeminiModeSelectorNotFound"
      - "last_error_type: GeminiModeSwitchDidNotApply"
      - "run_meta.mode_text remains 思考 while preset=pro"
    mitigations:
      - "expand mode trigger detection to include 模式/Mode and menu trigger variants"
      - "mode menu option click supports menuitemradio/menuitem/button"
      - "fail-closed when Pro switch not applied (no silent fallback to thinking)"
    references:
      - "chatgpt_web_mcp/providers/gemini/core.py (_gemini_find_mode_button/_gemini_click_mode_option)"
      - "artifacts/jobs/7f72fac414264080a68eb28587c441dd/run_meta.json"
      - "artifacts/jobs/2373f166e3ff40a382fb4e22c3919cf7/run_meta.json"

  - id: ISSUE-0010
    title: "Gemini Deep Think overload/crowded message returns no useful answer"
    status: "mitigated"
    signals:
      - "result.answer contains deep_think overloaded text (A lot of people are using Deep Think right now...)"
      - "status=completed but answer is short overload/crowded notice"
    mitigations:
      - "driver clicks Deep Think retry control up to 3 times by default"
      - "if still overloaded after retries, ChatgptREST executor falls back to Gemini Pro"
    references:
      - "chatgpt_web_mcp/providers/gemini/core.py (_gemini_retry_deep_think_overloaded_answer)"
      - "chatgpt_web_mcp/providers/gemini/ask.py (gemini_web_ask_pro_deep_think)"
      - "chatgptrest/executors/gemini_web_mcp.py (deep_think overloaded fallback)"

  - id: ISSUE-0011
    title: "ChatgptREST API start-limit-hit causes MCP Connection refused"
    status: "mitigated"
    signals:
      - "MCP submit error contains '[Errno 111] Connection refused'"
      - "systemd: chatgptrest-api.service status=failed(start-limit-hit)"
      - "port 18711 not listening while 18712 still up"
    mitigations:
      - "MCP auto-heal API autostart enabled by default (CHATGPTREST_MCP_AUTO_START_API=1)"
      - "runbook recovery: reset-failed + restart api + health check"
    references:
      - "docs/handoff_chatgptrest_history.md (entry 48)"
      - "docs/runbook.md (systemd section)"

  - id: ISSUE-0012
    title: "Pro trivial/smoke prompts increase wind-control risk"
    status: "mitigated"
    signals:
      - "request question is trivial (e.g. 请回复OK/reply ok) on Pro preset"
      - "params.purpose=smoke/test with Pro preset"
    mitigations:
      - "API hard guard: trivial_pro_prompt_blocked"
      - "API hard guard: pro_smoke_test_blocked"
      - "client wrapper enforces 61s interval for ChatGPT Pro sends"
    references:
      - "chatgptrest/api/routes_jobs.py (Pro guard checks)"
      - "skills-src/chatgptrest-call/scripts/chatgptrest_call.py"
      - "docs/runbook.md (prompt safety guardrails)"

  - id: ISSUE-0013
    title: "Client issue ledger stale open items not auto-mitigated"
    status: "mitigated"
    signals:
      - "GET /v1/issues?source=worker_auto&status=open,in_progress shows long-tail stale rows"
      - "no recurrence for >72h but status remains open/in_progress"
    mitigations:
      - "openclaw guardian periodic TTL sweep sets stale items to mitigated"
      - "tunable via CHATGPTREST_CLIENT_ISSUE_AUTOCLOSE_*"
    references:
      - "ops/openclaw_guardian_run.py (_sweep_client_issue_autoclose)"
      - "docs/runbook.md (Client Issue Ledger / OpenClaw Guardian)"

  - id: ISSUE-0014
