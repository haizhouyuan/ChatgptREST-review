      - "chrome.log contains repeated 'GPU process exited unexpectedly: exit_code=15'"
      - "viewer appears unstable/black while status endpoints still report healthy ports"
    mitigations:
      - "viewer_watchdog scans recent chrome.log window and treats exit_code=15 burst as unhealthy"
      - "on threshold hit, watchdog forces full viewer restart (X/VNC/Chrome)"
    references:
      - "ops/viewer_watchdog.py"
      - "tests/test_viewer_watchdog.py"
      - "docs/runbook.md (viewer watchdog tunables)"

  - id: ISSUE-0019
    title: "Public advisor-agent MCP long-run client ergonomics are still rough"
    status: "observed"
    signals:
      - "advisor_agent_turn validation rejects scalar attachments with list_type error"
      - "delivery_mode_requested=sync but delivery_mode_effective=deferred for long report turns"
      - "client must poll advisor_agent_status repeatedly with no dedicated wait primitive"
      - "status remains running without granular phase or ETA for long report-grade jobs"
    mitigations:
      - "accept scalar attachment sugar or return explicit remediation hint"
      - "surface clearer sync-to-background handoff semantics and recommended client action"
      - "add a public advisor wait primitive or equivalent long-poll terminal answer helper"
      - "expose richer execution phases / partial readiness for long-running advisor sessions"
      - "strengthen public MCP schema alignment as northbound capabilities evolve"
    references:
      - "docs/dev_log/2026-03-25_public_agent_mcp_client_experience_issue_pack_v1.md"
      - "docs/client_interactions_v3.md"
      - "docs/contract_v1.md"

  - id: ISSUE-0020
    title: "Agent wrapper labels local validation failures as still-running advisor sessions"
    status: "observed"
    signals:
      - "chatgptrest_call.py rejects --request-timeout-seconds < --timeout-seconds before submission"
      - "returned error payload still says still_running_possible=true"
      - "recovery_hint tells client to use advisor_agent_status/advisor_agent_wait even though no remote turn started"
    mitigations:
      - "differentiate local_validation_failure from transport_timeout in agent-mode error classification"
      - "set still_running_possible=false for preflight validation failures"
      - "return a recovery hint that explicitly says the turn was rejected before submission"
    references:
      - "skills-src/chatgptrest-call/scripts/chatgptrest_call.py"
      - "docs/dev_log/2026-03-25_public_agent_live_client_validation_followup_v1.md"

  - id: ISSUE-0021
    title: "Live chatgptrest_call wrapper path is less reliable/observable than the repo's validated public MCP path"
    status: "observed"
    signals:
      - "valid live advisor_agent_turn wrapper calls can remain blocked with no early summary file"
      - "explicit session_id not visible in controller_runs/advisor_runs during initial observation window"
      - "chatgptrest-mcp.service journal still records POST /mcp and CallToolRequest"
      - "repo validation path performs initialize before tools/call while wrapper currently posts tools/call directly"
    mitigations:
      - "unify chatgptrest_call.py with the shared MCP HTTP client / initialize handshake path"
      - "or explicitly bootstrap initialize/session semantics in the wrapper before tools/call"
      - "make advisor_agent_turn expose faster accepted-state / durable session visibility for recovery"
    references:
      - "skills-src/chatgptrest-call/scripts/chatgptrest_call.py"
      - "chatgptrest/eval/public_agent_mcp_validation.py"
      - "docs/dev_log/2026-03-25_public_agent_live_client_validation_followup_v1.md"

  - id: ISSUE-0022
    title: "Sync planning path can write initialize-only summary instead of accepted turn summary"
    status: "observed"
    signals:
      - "wrapper summary file shows status=initialized and submission_started=false"
      - "wrapper process is still running after that summary is written"
      - "summary does not advance from initialized state during the initial observation window"
      - "problem reproduced on a sync planning request, not on deferred ChatGPT/Gemini repo-review paths"
    mitigations:
      - "inspect early-summary state machine in chatgptrest_call.py"
      - "ensure out-summary is written from the accepted turn result, not raw MCP initialize/bootstrap state"
      - "keep sync/deferred summary branches separate so initialize metadata cannot leak into turn summary"
    references:
      - "skills-src/chatgptrest-call/scripts/chatgptrest_call.py"
      - "docs/dev_log/2026-03-25_public_agent_wrapper_live_retest_findings_v1.md"

  - id: ISSUE-0023
    title: "Live wrapper path still persists generic mcp-agent/public-mcp caller identity"
    status: "observed"
    signals:
      - "live wrapper request is accepted and persisted"
      - "state/agent_sessions/<session>.json task_intake.context.client remains {name: mcp-agent, instance: public-mcp}"
      - "richer upstream caller identity is not visible in persisted live session state"
    mitigations:
      - "trace end-to-end caller identity from live MCP transport into agent_mcp and onward into /v3/agent/turn"
      - "prove that the standard wrapper path persists actual upstream caller metadata instead of generic mcp-agent/public-mcp"
      - "prevent later session-persistence collapse/overwrite of richer client identity if it already exists earlier in the request chain"
    references:
      - "chatgptrest/mcp/agent_mcp.py"
      - "chatgptrest/api/routes_agent_v3.py"
      - "docs/dev_log/2026-03-25_public_agent_misuse_guardrails_live_client_retest_v1.md"
