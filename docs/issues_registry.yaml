      - "optional timer keeps orch/codex worker agent registration aligned"
    references:
      - "ops/openclaw_orch_agent.py"
      - "ops/systemd/chatgptrest-orch-doctor.service"
      - "docs/runbook.md (OpenClaw Orch Agent)"

  - id: ISSUE-0015
    title: "UI selector drift is only discovered after first failing production job"
    status: "mitigated"
    signals:
